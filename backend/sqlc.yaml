version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/sqlc/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/sqlc/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true