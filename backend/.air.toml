root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  entrypoint = ["./tmp/main"]
  pre_cmd = ["pkill -f 'backend/tmp/main' 2>/dev/null || true", "lsof -ti tcp:8080 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules", "bin"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "1s"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
